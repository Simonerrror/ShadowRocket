name: Publish release artifacts

on:
  workflow_dispatch:
    inputs:
      channel:
        description: Release channel to publish
        required: true
        default: shared
        type: choice
        options:
          - shared
          - custom
  schedule:
    - cron: "15 4 * * 0"
  push:
    branches:
      - source/main
      - custom/sergio
    paths:
      - ".github/workflows/publish-release.yml"
      - ".gitignore"
      - "AGENTS.md"
      - "README.md"
      - "docs/**"
      - "HAPP/README.md"
      - "XKeen/README.md"
      - "clash_config.yaml"
      - "shadowrocket.conf"
      - "shadowrocket_custom.conf"
      - "modules/**"
      - "scripts/**"
      - "distillate/manifest.json"
      - "distillate/filters/**"
      - "distillate/overlays/**"
      - "rules/adobe_telemetry_custom.list"
      - "rules/russia_extended.list"
      - "rules/voice_ports.list"

permissions:
  contents: write

jobs:
  publish-shared:
    if: github.event_name == 'schedule' || github.ref_name == 'source/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'shared')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout shared source branch
        uses: actions/checkout@v4
        with:
          ref: source/main
          path: source
          fetch-depth: 0

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: release
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Build and publish shared release
        working-directory: source
        run: |
          set -euo pipefail
          BUILD_STAMP="$(git log -1 --format=%ct)"
          python scripts/publish_release.py --channel shared --publish-dir ../release --build-stamp "$BUILD_STAMP"

      - name: Commit and push shared release
        working-directory: release
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(release): publish shared artifacts"
            git push
          else
            echo "No release changes to publish."
          fi

  publish-custom:
    if: github.ref_name == 'custom/sergio' || (github.event_name == 'workflow_dispatch' && github.event.inputs.channel == 'custom')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout custom source branch
        uses: actions/checkout@v4
        with:
          ref: custom/sergio
          path: source
          fetch-depth: 0

      - name: Checkout release branch
        uses: actions/checkout@v4
        with:
          ref: main
          path: release
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Publish custom release paths
        working-directory: source
        run: |
          set -euo pipefail
          python scripts/publish_release.py --channel custom --publish-dir ../release

      - name: Commit and push custom release
        working-directory: release
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "chore(release): publish custom artifacts"
            git push
          else
            echo "No custom release changes to publish."
          fi
