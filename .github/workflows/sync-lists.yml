name: Sync rule lists

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Install Mihomo
        run: |
          set -euo pipefail
          ARCH=$(dpkg --print-architecture)
          URL=$(curl -fsSL https://api.github.com/repos/MetaCubeX/mihomo/releases/latest \
            | grep -oP '"browser_download_url":\s*"\K[^"]*mihomo-linux-'"$ARCH"'-[^"]*\.deb(?=")' \
            | head -n1)
          curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused -o /tmp/mihomo.deb "$URL"
          sudo dpkg -i /tmp/mihomo.deb || sudo apt-get install -f -y
          rm -f /tmp/mihomo.deb

      - name: Install sing-box
        run: |
          set -euo pipefail
          curl -fsSL --retry 3 --retry-delay 2 --retry-connrefused https://sing-box.app/install.sh \
            | sudo -E sh -s -- --version 1.12.12

      - name: Sync lists
        run: python scripts/sync_lists.py --no-pull

      - name: Build compiled distillate artifacts
        run: python scripts/build_distillate.py

      - name: Commit and push changes
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add rules/*.list distillate
            git commit -m "chore: refresh vendored distillate sources"
            git push
          else
            echo "No changes to commit."
          fi
