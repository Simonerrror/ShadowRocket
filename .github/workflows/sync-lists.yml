name: Sync rule lists

on:
  workflow_dispatch:
  schedule:
    - cron: "15 4 * * 0"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Sync lists
        run: python scripts/sync_lists.py --no-pull

      - name: Build compiled distillate artifacts
        run: python scripts/build_distillate.py

      - name: Commit and push changes
        run: |
          set -euo pipefail
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add -A distillate rules
            git commit -m "chore: refresh vendored distillate sources"
            git push
          else
            echo "No changes to commit."
          fi
