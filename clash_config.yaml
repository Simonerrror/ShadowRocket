# CLASH VERGE REV (MIHOMO) CONFIG
# AUTO-GENERATED FROM shadowrocket.conf
# Derived routing truth: proxy groups, rule-providers, rules

port: 7890
socks-port: 7891
allow-lan: false
mode: rule
log-level: info
ipv6: false
geoip-code: RU

# 1. TUN MODE
tun:
  enable: true
  stack: system
  dns-hijack:
    - any:53
  auto-route: true
  auto-detect-interface: true

# 2. DNS (Fake-IP)
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.localhost"
    - "+.home.arpa"
    - "*.localdomain"
    - "time.*.com"
    - "time.*.gov"
    - "time.*.edu"
    - "time.windows.com"
    - "time.apple.com"
    - "time.android.com"
    - "*.ntp.org"
  default-nameserver:
    - 77.88.8.8
    - 8.8.8.8
  nameserver:
    - 77.88.8.8
    - 8.8.8.8
  fallback:
    - tls://77.88.8.8
    - tls://8.8.8.8
  fallback-filter:
    geoip: false
    ipcidr:
      - 0.0.0.0/0

# 3. PROVIDERS
proxy-providers:
  Main-Sub:
    type: http
    url: "<INSERT_SUBSCRIPTION_URL_HERE>"
    interval: 3600
    path: ./proxies/main.yaml
    filter: "(?i)(Vless|Netherlands\\s+WL\\s+Mobile)"
    exclude-filter: "(?i)(Russia|Belarus|Ukraine)"
    health-check:
      enable: true
      interval: 780
      url: "https://abs.twimg.com/favicon.ico"

# 4. RULE PROVIDERS
rule-providers:
  whitelist_direct:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Simonerrror/ShadowRocket/main/rules/whitelist_direct.list"
    path: ./rules/whitelist_direct.yaml
    interval: 86400

  greylist_proxy:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Simonerrror/ShadowRocket/main/rules/greylist_proxy.list"
    path: ./rules/greylist_proxy.yaml
    interval: 86400

  google_all:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Simonerrror/ShadowRocket/main/rules/google-all.list"
    path: ./rules/google_all.yaml
    interval: 86400

  microsoft:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Simonerrror/ShadowRocket/main/rules/microsoft.list"
    path: ./rules/microsoft.yaml
    interval: 86400

  domains_community:
    type: http
    behavior: classical
    url: "https://raw.githubusercontent.com/Simonerrror/ShadowRocket/main/rules/domains_community.list"
    path: ./rules/domains_community.yaml
    interval: 86400

# 5. PROXY GROUPS
proxy-groups:
  - name: AUTO-MAIN
    type: fallback
    use:
      - Main-Sub
    filter: "^(?!.*(Russia|Belarus|Ukraine)).*Vless.*$"
    url: "https://abs.twimg.com/favicon.ico"
    interval: 780

  - name: AUTO-WL
    type: fallback
    use:
      - Main-Sub
    filter: "(?i)^(?!.*(Russia|Belarus|Ukraine))(?:.*WL.*Vless.*|.*Vless.*WL.*)$"
    url: "https://abs.twimg.com/favicon.ico"
    interval: 180

  - name: GOOGLE
    type: fallback
    use:
      - Main-Sub
    filter: "(?i)(?:.*WL.*Vless.*|.*Vless.*WL.*|.*Netherlands.*Vless.*|.*Vless.*Netherlands.*|.*UAE.*Vless.*|.*Vless.*UAE.*)"
    url: "https://docs.google.com/spreadsheets/"
    interval: 300

  - name: WL
    type: select
    use:
      - Main-Sub
    filter: "(?i)(?:.*WL.*Vless.*|.*Vless.*WL.*)"

  - name: MANUAL-PROXY
    type: select
    use:
      - Main-Sub
    filter: "(?i).*Vless.*$"

  - name: PROXY
    type: select
    proxies:
      - AUTO-WL
      - AUTO-MAIN
      - WL
      - MANUAL-PROXY
      - DIRECT

# 6. RULES
rules:
  - RULE-SET,whitelist_direct,DIRECT
  - RULE-SET,greylist_proxy,PROXY
  - RULE-SET,google_all,GOOGLE
  - RULE-SET,microsoft,PROXY
  - RULE-SET,domains_community,PROXY
  - DOMAIN-SUFFIX,ru,DIRECT
  - DOMAIN-SUFFIX,xn--p1ai,DIRECT
  - DOMAIN-SUFFIX,su,DIRECT
  - GEOIP,RU,DIRECT
  - GEOIP,private,DIRECT
  - MATCH,PROXY
